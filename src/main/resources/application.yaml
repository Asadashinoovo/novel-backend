mybatis-plus:
  mapper-locations: classpath:xml/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8081
spring:
  application:
    name: djs
  profiles:
    active : dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/novel?characterEncoding=utf8&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: your_psw

  data:
    redis:
      host: localhost
      port: 6379
      password: your_psw

deepseek:
  api:
    key: your_apikey
    base-url: https://api.deepseek.com
    chat-model: deepseek-v4-pro
    connect-timeout: 10
    timeout: 120

dashscope:
  api:
    key: your_apikey
  embedding:
    model: text-embedding-v4
    dimensions: 1024

novel:
  ai:
    search-mode: hybrid         # fulltext | vector | hybrid | elasticsearch
    mq-mode: noop               # noop | rocketmq | rabbitmq
    cache-enabled: true
    cache-ttl-hours: 24
    async-threshold-ms: 10000   # 超过 10s 的请求走 MQ 异步
